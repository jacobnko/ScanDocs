name: ScanDocs
options:
  bundleIdPrefix: com.jacobkostudio
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
targets:
  ScanDocs:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ScanDocs
    info:
      path: ScanDocs/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "ScanDocs는 문서를 스캔하기 위해 카메라를 사용합니다."
        NSPhotoLibraryAddUsageDescription: "ScanDocs는 스캔한 문서를 사진 앱에 저장하기 위해 접근합니다."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobkostudio.ScanDocs
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
